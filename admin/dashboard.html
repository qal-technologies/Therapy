<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="admin-dashboard">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-avatar">
                    <!-- Placeholder for admin avatar -->
                </div>
                <div class="header-icons">
                    <i class="bi bi-brightness-high-fill" id="theme-switcher"></i>
                    <a href="/html/main/Home.html" target="_blank"><i class="bi bi-box-arrow-up-right"></i></a>
                    <i class="bi bi-box-arrow-right" id="logout-btn"></i>
                </div>
            </header>
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input type="text" placeholder="Search or start new chat">
                <div class="filter-icon">
                    <i class="bi bi-filter"></i>
                </div>
            </div>
            <div class="filter-options">
                <button data-filter="all">All</button>
                <button data-filter="unread">Unread</button>
                <button data-filter="signup">Signup</button>
                <button data-filter="login">Login</button>
                <button data-filter="payment">Payment</button>
                <button data-filter="waitlist">Waitlist</button>
            </div>
            <div class="user-list-container">
                <!-- User list will be dynamically inserted here -->
            </div>
        </aside>
        <main class="chat-view">
            <header class="chat-header">
                <div class="user-avatar"></div>
                <div class="user-info">
                    <span class="user-name">John Doe</span>
                    <span class="user-status">online</span>
                </div>
                <div class="header-icons">
                    <i class="bi bi-search"></i>
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
            </header>
            <div class="message-container">
                <!-- Messages will be dynamically loaded here -->
                <div class="message-bubble received">
                    <div class="message-content">
                        <p>Payment of €550.00 initiated for a session.</p>
                        <span class="message-meta">10:49 AM</span>
                    </div>
                    <div class="reply-button">
                        <i class="bi bi-reply-fill"></i>
                    </div>
                </div>
                <div class="message-bubble sent">
                    <div class="message-content">
                        <p>approved</p>
                         <span class="message-meta">10:50 AM</span>
                    </div>
                </div>
            </div>
            <footer class="chat-footer">
                <i class="bi bi-emoji-smile"></i>
                <i class="bi bi-paperclip"></i>
                <textarea class="message-input" placeholder="Type a message"></textarea>
                <button id="send-btn" class="send-btn">
                    <i class="bi bi-send-fill"></i>
                </button>
            </footer>
        </main>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
